name: Playwright Table Sum QA

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  sum-tables:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # REQUIRED STEP NAME WITH YOUR EMAIL
      - name: Run scraper - 21f3000161@ds.study.iitm.ac.in
        run: npm run sum:tables
